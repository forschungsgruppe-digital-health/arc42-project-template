name: release-please

# Automated releases: SemVer via release-please + Conventional Commits (ADR-0003).
# Merging to main opens/updates a "Release vX.Y.Z" PR; merging THAT PR tags the release,
# publishes the GitHub release, and updates CHANGELOG.md + version.txt.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Uses release-please-config.json + .release-please-manifest.json by default.
          token: ${{ secrets.GITHUB_TOKEN }}

  # Publish/build step — runs only when a release was just cut.
  # This template publishes no artifacts; wire your build/publish/container step here.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Released ${{ needs.release-please.outputs.tag_name }} — add your publish/build step here."
